{% extends 'base.html' %}
{% block main %}
<h1 class="page-header">Images</h1>
{% include 'flash_messages.html' %} 

<ul id="uploaded-images">
{% for image in images %}
    <li>
        <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}" class="uploaded-image">
    </li>
{% endfor %}
</ul>

{% endblock %}
